<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Quantity side -->
  <rect x="40" y="20" width="270" height="160" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="175" y="50" text-anchor="middle" dominant-baseline="central" fill="#085041" font-size="14" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Кількість</text>
  <text x="175" y="70" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="12" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Скільки? Яка кількість?</text>

  <circle cx="100" cy="118" r="14" fill="#0F6E56" opacity="0.7"/>
  <circle cx="145" cy="118" r="14" fill="#0F6E56" opacity="0.7"/>
  <circle cx="190" cy="118" r="14" fill="#0F6E56" opacity="0.7"/>
  <circle cx="235" cy="118" r="14" fill="#0F6E56" opacity="0.7"/>
  <circle cx="280" cy="118" r="14" fill="#0F6E56" opacity="0.7"/>

  <text x="175" y="160" text-anchor="middle" dominant-baseline="central" fill="#3D3D3A" font-size="12" font-family="-apple-system, BlinkMacSystemFont, sans-serif">5 об'єктів — число вимірює кількість</text>

  <!-- Order side -->
  <rect x="370" y="20" width="270" height="160" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="505" y="50" text-anchor="middle" dominant-baseline="central" fill="#26215C" font-size="14" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Порядок</text>
  <text x="505" y="70" text-anchor="middle" dominant-baseline="central" fill="#534AB7" font-size="12" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Який за рахунком? Де стоїть?</text>

  <!-- Podium -->
  <rect x="395" y="130" width="40" height="30" rx="4" fill="#534AB7" opacity="0.3"/>
  <text x="415" y="145" text-anchor="middle" dominant-baseline="central" fill="#26215C" font-size="11" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">2-й</text>

  <rect x="445" y="115" width="40" height="45" rx="4" fill="#534AB7" opacity="0.6"/>
  <text x="465" y="137" text-anchor="middle" dominant-baseline="central" fill="#26215C" font-size="11" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">1-й</text>

  <rect x="495" y="140" width="40" height="20" rx="4" fill="#534AB7" opacity="0.2"/>
  <text x="515" y="150" text-anchor="middle" dominant-baseline="central" fill="#26215C" font-size="11" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">3-й</text>

  <text x="505" y="175" text-anchor="middle" dominant-baseline="central" fill="#3D3D3A" font-size="12" font-family="-apple-system, BlinkMacSystemFont, sans-serif">число описує позицію у послідовності</text>
</svg>
