<svg width="100%" viewBox="0 0 680 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-whole" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Number line -->
  <line x1="40" y1="65" x2="640" y2="65" marker-end="url(#arrow-whole)" stroke="#73726C" stroke-width="1.5"/>

  <!-- Zero node — green (whole, not natural) -->
  <circle cx="100" cy="65" r="22" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="100" y="65" text-anchor="middle" dominant-baseline="central" fill="#085041" font-size="14" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">0</text>

  <!-- Natural number nodes — purple -->
  <circle cx="190" cy="65" r="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="190" y="65" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-size="14" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">1</text>

  <circle cx="280" cy="65" r="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="280" y="65" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-size="14" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">2</text>

  <circle cx="370" cy="65" r="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="370" y="65" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-size="14" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">3</text>

  <circle cx="460" cy="65" r="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="460" y="65" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-size="14" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">4</text>

  <circle cx="550" cy="65" r="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="550" y="65" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-size="14" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">5</text>

  <text x="610" y="65" text-anchor="middle" dominant-baseline="central" fill="#141413" font-size="14" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif">…</text>

  <!-- Labels below -->
  <text x="100" y="100" text-anchor="middle" fill="#0F6E56" font-size="11" font-family="-apple-system, BlinkMacSystemFont, sans-serif">лише тут</text>
  <text x="370" y="100" text-anchor="middle" fill="#534AB7" font-size="11" font-family="-apple-system, BlinkMacSystemFont, sans-serif">натуральні числа: 1, 2, 3, 4, 5, …</text>

  <!-- Legend -->
  <circle cx="55" cy="120" r="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="3 1.5"/>
  <text x="68" y="120" dominant-baseline="central" fill="#085041" font-size="11" font-family="-apple-system, BlinkMacSystemFont, sans-serif">нуль — ціле невід'ємне, але НЕ натуральне</text>

  <circle cx="390" cy="120" r="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="403" y="120" dominant-baseline="central" fill="#3C3489" font-size="11" font-family="-apple-system, BlinkMacSystemFont, sans-serif">натуральні числа</text>
</svg>
